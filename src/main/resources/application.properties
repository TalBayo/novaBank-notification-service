spring.config.import=optional:file:.env[.properties]


spring.application.name=notification-service
server.port=8080

#MYSQL DATABASE CONNECTION
spring.datasource.url=${DB_URL_NOTIFICATION}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#JPA / Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#KAFKA CONFIG AS CONSUMER
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=notification-group

# Start consuming from the earliest offset if no previous offset is committed,
# allowing processing of messages that arrived while the service was unavailable.
spring.kafka.consumer.auto-offset-reset=earliest

# Wraps deserialization errors to prevent consumer crash on invalid messages
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegates actual JSON deserialization to JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Maps producer event classes to consumer-side event classes for correct deserialization
spring.kafka.consumer.properties.spring.json.type.mapping=\
  com.example.userAccountService.kafka.dto.UserRegistrationEvent:com.example.notificationService.kafka.dto.UserRegistrationEvent,\
  com.example.userAccountService.kafka.dto.BalanceUpdateEvent:com.example.notificationService.kafka.dto.BalanceUpdateEvent

spring.kafka.consumer.properties.spring.json.trusted.packages=*

#SMTP EMAIL CONFIG
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#For debugging
spring.mail.properties.mail.debug=true

#Eureka Discovery Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
